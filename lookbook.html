<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookbook | Photrix</title>
    <!-- Lenis CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.css">
    <link rel="stylesheet" href="lookbook.css">
</head>
<body class="theme-royal-gold">

    <!-- Top Navigation Bar -->
    <header class="lookbook-header">
        <div class="logo">PHOTRIX</div>
        <div class="theme-dropdown-container">
            <button id="theme-menu-btn" class="theme-menu-toggle">✨ Themes ▾</button>
            <div id="theme-dropdown-menu" class="theme-dropdown-content">
                <button onclick="setTheme('royal-gold')">Royal Gold</button>
                <button onclick="setTheme('minimal-dark')">Minimal Dark</button>
                <button onclick="setTheme('pastel-bloom')">Pastel Bloom</button>
                <!-- Future themes dynamically yahan add ho sakengi -->
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="lookbook-hero">
        <h1 id="couple-names">Loading Gallery...</h1>
        <p id="gallery-sub-status">Please wait while we fetch your memories.</p>
    </section>

    <!-- PIN Gate Modal Overlay -->
    <div id="gallery-pin-gate" class="pin-modal-overlay">
        <div class="pin-modal-card">
            <h3>Enter Gallery PIN</h3>
            <p>Enter the 6-digit gallery PIN shared by your photographer.</p>
            <input type="password" id="gallery-pin-input" maxlength="6" placeholder="------">
        </div>
    </div>

    <!-- Main Photo Masonry Grid -->
    <main class="lookbook-main-container">
        <div id="main-photo-grid" class="masonry-grid"></div>
    </main>

    <!-- Bottom Floating Glassmorphic Dock (Action Bar) -->
    <footer id="action-footer" class="floating-dock" style="display: none;">
        <div class="dock-content">
            <div id="counter-zone" class="counter-badge">
                Selected: <span id="selected-count">0</span> / 40
            </div>
            <div class="dock-actions">
                <button id="submit-selection-btn" class="btn-primary">Submit Selection</button>
                <button id="download-zip-btn" class="btn-secondary" style="display: none;">Download HD ZIP</button>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="lookbook.js"></script>
</body>
</html>
